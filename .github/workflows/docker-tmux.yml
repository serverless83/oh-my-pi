name: Build & Push Docker (tmux)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [Dockerfile.tmux]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: '${{ secrets.GITHUB_TOKEN }}'

      - name: Build and push
        run: |
          docker build -f Dockerfile.tmux \
            -t ghcr.io/${{ github.repository }}:tmux \
            -t ghcr.io/${{ github.repository }}:tmux-${{ github.sha }} .
          docker push --all-tags ghcr.io/${{ github.repository }}
